name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (without the biochar dependency)
        # `biochar` needs RDKit and is not on PyPI, so it can't be resolved in
        # CI. Install pytest + this package with --no-deps; the
        # biochar-dependent tests skip cleanly via importorskip, while the
        # pure-logic / CLI / contract / example tests run.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest -q
